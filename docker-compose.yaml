services:
  db:
    image: postgres:17
    container_name: postsys_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - postsys_network
    env_file:
      - .env

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    container_name: postsys_migrate
    environment:
      GOOSE_DRIVER: ${DB_PROTOCOL}
      GOOSE_DBSTRING: "host=${DB_HOST} port=${DB_PORT} user=${DB_USER} dbname=${DB_NAME} password=${DB_PASSWORD} ${DB_OPTIONS}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    networks:
      - postsys_network
    env_file:
      - .env

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postsys
    environment:
      TIMEOUT: ${TIMEOUT}
      IDLE_TIMEOUT: ${IDLE_TIMEOUT}
      SERVER_PORT: ${SERVER_PORT}
      STORAGE_TYPE: ${STORAGE_TYPE}
      DB_PROTOCOL: ${DB_PROTOCOL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - 127.0.0.1:8080:8080
    networks:
      - postsys_network
    env_file:
      - .env

volumes:
  db_data:
networks:
  postsys_network:
    driver: bridge    